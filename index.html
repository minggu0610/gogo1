<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과몰입 밸런스 게임 - 도파민 뿜뿜 익명 토론</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo" id="header-logo">🔥 과몰입 밸런스</div>
      <nav>
        <button id="open-partnership" class="text-btn">제휴 문의</button>
      </nav>
    </header>

    <main id="main-content">
      <!-- 1. Home View (Categories) -->
      <section id="view-home" class="view active">
        <h2 class="section-title">카테고리 선택</h2>
        <div class="category-grid">
          <button class="cat-btn" data-cat="general">
            <span class="emoji">⚖️</span>
            <span class="label">일반 밸런스</span>
          </button>
          <button class="cat-btn" data-cat="adult">
            <span class="emoji">🔞</span>
            <span class="label">19금 밸런스</span>
          </button>
          <button class="cat-btn" data-cat="couples">
            <span class="emoji">💕</span>
            <span class="label">연인 밸런스</span>
          </button>
          <button class="cat-btn" data-cat="truth">
            <span class="emoji">🤫</span>
            <span class="label">진실게임</span>
          </button>
          <button class="cat-btn" data-cat="muncheol">
            <span class="emoji">👨‍⚖️</span>
            <span class="label">문철빵</span>
          </button>
        </div>
      </section>

      <!-- 2. Category Board View (Game List) -->
      <section id="view-category" class="view hidden">
        <div class="view-header">
          <button id="back-to-home" class="back-btn">⬅️ 뒤로가기</button>
          <h2 id="category-title" class="section-title">일반 밸런스</h2>
        </div>
        <div id="game-list" class="game-list">
          <!-- Game list items will be injected here -->
        </div>
      </section>

      <!-- 3. Game Play View -->
      <section id="view-game" class="view hidden">
        <div class="view-header">
          <button id="back-to-category" class="back-btn">⬅️ 목록으로</button>
        </div>
        <div class="card">
          <div class="question-header">당신의 선택은?</div>
          <h2 id="question-text" class="question">질문 로딩 중...</h2>
          
          <div class="vote-buttons">
            <button id="vote-a" class="vote-btn option-a">
              <span class="option-label">A</span>
              <span class="option-text">옵션 A</span>
            </button>
            <button id="vote-b" class="vote-btn option-b">
              <span class="option-label">B</span>
              <span class="option-text">옵션 B</span>
            </button>
          </div>

          <div id="stats-view" class="stats-container hidden">
            <div class="result-message" id="result-text">통계 로딩 중...</div>
            <div class="stat-bar-group">
              <div class="stat-label">
                <span id="label-a">옵션 A</span>
                <span id="percent-a">0%</span>
              </div>
              <div class="progress-bg">
                <div id="bar-a" class="progress-fill bar-a" style="width: 0%"></div>
              </div>
            </div>
            <div class="stat-bar-group">
              <div class="stat-label">
                <span id="label-b">옵션 B</span>
                <span id="percent-b">0%</span>
              </div>
              <div class="progress-bg">
                <div id="bar-b" class="progress-fill bar-b" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Disqus Section -->
        <div class="disqus-section">
          <div id="disqus_thread"></div>
        </div>
      </section>

      <section class="ugc-section">
        <button id="open-submit" class="ugc-btn">🙋‍♂️ 나도 질문/사연 올리기</button>
      </section>
    </main>

    <!-- Modal for Partnership/Submit -->
    <div id="form-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2 id="modal-title">문의/제보하기</h2>
        <form action="https://formspree.io/f/mlgvagkd" method="POST" id="partnership-form">
          <div class="form-group">
            <label for="name">이름/닉네임</label>
            <input type="text" id="name" name="name" required placeholder="성함 또는 닉네임을 입력해주세요.">
          </div>
          <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="_replyto" required placeholder="답변받으실 이메일을 입력해주세요.">
          </div>
          <div class="form-group">
            <label for="message">내용</label>
            <textarea id="message" name="message" required placeholder="제휴 문의 또는 밸런스 게임 사연을 상세히 적어주세요."></textarea>
          </div>
          <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 과몰입 밸런스. All rights reserved.</p>
  </footer>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
